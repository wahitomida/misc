<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="centerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>
  <!-- 収束を示す軌跡ライン -->
  <g stroke="#C7D2FE" stroke-width="0.5" opacity="0.3" stroke-linecap="round">
    <line x1="16"    y1="4"     x2="16"    y2="9"/>
    <line x1="26"    y1="10.5"  x2="21.62" y2="12.91"/>
    <line x1="25.5"  y1="22"    x2="21.27" y2="19.33"/>
    <line x1="16"    y1="28"    x2="16"    y2="23"/>
    <line x1="6"     y1="22.5"  x2="10.19" y2="19.78"/>
    <line x1="6.5"   y1="10"    x2="10.73" y2="12.67"/>
  </g>
  <!-- 外周の6点（情報源 = 企業） -->
  <circle cx="16"    cy="4"     r="2"   fill="#A5B4FC" opacity="0.7"/>
  <circle cx="26"    cy="10.5"  r="1.8" fill="#8B5CF6" opacity="0.9"/>
  <circle cx="25.5"  cy="22"    r="1.6" fill="#A5B4FC" opacity="0.6"/>
  <circle cx="16"    cy="28"    r="1.7" fill="#A5B4FC" opacity="0.7"/>
  <circle cx="6"     cy="22.5"  r="2"   fill="#A5B4FC" opacity="0.5"/>
  <circle cx="6.5"   cy="10"    r="1.6" fill="#A5B4FC" opacity="0.8"/>
  <!-- 中心の円（集約されたレポート） -->
  <circle cx="16" cy="16" r="4" fill="url(#centerGradient)"/>
</svg>

