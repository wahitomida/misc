# pytest configuration for AI Orchestra
# - asyncio_mode = auto so async test functions can omit @pytest.mark.asyncio
# - integration / e2e markers registered to avoid PytestUnknownMarkWarning
[pytest]
addopts = -ra
asyncio_mode = auto
markers =
    integration: 実機 KotoBuddy API に接続する統合テスト
    e2e: 全フローを通す E2E テスト
