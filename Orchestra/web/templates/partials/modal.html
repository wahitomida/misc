{# 汎用モーダルダイアログ
   設計書: doc/ui/03_components.md §10

   使用例 (任意のJSから):
     window.dispatchEvent(new CustomEvent('open-modal', {
       detail: {
         title: 'タイトル',
         message: '本文',
         action: () => { ... },  // 確認ボタンクリック時。null可
         confirmLabel: '削除',   // 任意
       }
     }));
#}
<div x-data="{
       modalOpen: false,
       modalTitle: '',
       modalMessage: '',
       modalAction: null,
       confirmLabel: '確認',
     }"
     x-cloak
     x-show="modalOpen"
     @keydown.escape.window="modalOpen = false"
     @open-modal.window="
       modalOpen = true;
       modalTitle = $event.detail.title || '';
       modalMessage = $event.detail.message || '';
       modalAction = $event.detail.action || null;
       confirmLabel = $event.detail.confirmLabel || '確認';
     "
     class="fixed inset-0 z-[60]"
     role="dialog"
     aria-modal="true"
     aria-labelledby="modal-title">

  <!-- 背景オーバーレイ -->
  <div class="absolute inset-0 bg-black/50 backdrop-blur-sm"
       x-show="modalOpen"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0"
       x-transition:enter-end="opacity-100"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100"
       x-transition:leave-end="opacity-0"
       @click="modalOpen = false">
  </div>

  <!-- モーダル本体 -->
  <div class="absolute inset-0 flex items-center justify-center p-4">
    <div class="relative w-full max-w-lg bg-white dark:bg-slate-800
                rounded-2xl shadow-2xl p-6"
         x-show="modalOpen"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         @click.stop>

      <div class="flex items-center justify-between mb-4">
        <h3 id="modal-title"
            class="text-lg font-bold text-slate-900 dark:text-white"
            x-text="modalTitle"></h3>
        <button @click="modalOpen = false"
                class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300
                       transition text-xl"
                aria-label="閉じる">
          ✕
        </button>
      </div>

      <div class="text-sm text-slate-600 dark:text-slate-400 mb-6"
           x-text="modalMessage">
      </div>

      <div class="flex justify-end gap-3">
        <button @click="modalOpen = false"
                class="px-4 py-2 text-sm rounded-xl
                       bg-slate-100 dark:bg-slate-700
                       hover:bg-slate-200 dark:hover:bg-slate-600
                       transition">
          キャンセル
        </button>
        <button @click="if(modalAction) modalAction(); modalOpen = false;"
                class="px-4 py-2 text-sm rounded-xl
                       bg-red-600 text-white
                       hover:bg-red-700 transition"
                x-text="confirmLabel">
          確認
        </button>
      </div>
    </div>
  </div>
</div>
