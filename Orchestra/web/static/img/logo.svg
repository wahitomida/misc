<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="orchestraCenter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="orchestraGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7DD3FC" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#67E8F9" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- 外側の同心円 (音波の広がり) -->
  <circle cx="16" cy="16" r="14" stroke="#BAE6FD" stroke-width="0.4" opacity="0.35" fill="none"/>
  <circle cx="16" cy="16" r="10" stroke="#7DD3FC" stroke-width="0.5" opacity="0.4"  fill="none"/>

  <!-- 6 人のオーケストラメンバー (収束線) -->
  <g stroke="#BAE6FD" stroke-width="0.5" opacity="0.4" stroke-linecap="round">
    <line x1="16"   y1="4"    x2="16"    y2="9"/>
    <line x1="26"   y1="10.5" x2="21.62" y2="12.91"/>
    <line x1="25.5" y1="22"   x2="21.27" y2="19.33"/>
    <line x1="16"   y1="28"   x2="16"    y2="23"/>
    <line x1="6"    y1="22.5" x2="10.19" y2="19.78"/>
    <line x1="6.5"  y1="10"   x2="10.73" y2="12.67"/>
  </g>

  <!-- 6 つのエージェント (外周ノード) -->
  <circle cx="16"   cy="4"    r="1.9" fill="#06B6D4" opacity="0.9"/>
  <circle cx="26"   cy="10.5" r="1.7" fill="#7DD3FC" opacity="0.8"/>
  <circle cx="25.5" cy="22"   r="1.7" fill="#7DD3FC" opacity="0.7"/>
  <circle cx="16"   cy="28"   r="1.7" fill="#7DD3FC" opacity="0.75"/>
  <circle cx="6"    cy="22.5" r="1.7" fill="#7DD3FC" opacity="0.7"/>
  <circle cx="6.5"  cy="10"   r="1.7" fill="#06B6D4" opacity="0.85"/>

  <!-- 中心 (指揮者 / 合意) -->
  <circle cx="16" cy="16" r="4.5" fill="url(#orchestraCenter)"/>

  <!-- 中心の音符ヘッド (ハイライト) -->
  <ellipse cx="16" cy="16.6" rx="1.8" ry="1.3" fill="#FFFFFF" opacity="0.85" transform="rotate(-20 16 16.6)"/>
</svg>
